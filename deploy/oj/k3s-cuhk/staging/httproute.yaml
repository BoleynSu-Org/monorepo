apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oj-httproute
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway
      sectionName: https
  hostnames:
    - "oj.staging.sujiao.de"
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: oj-server-service
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
      timeouts:
        request: "30s"
        backendRequest: "30s"
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: "X-Robots-Tag"
                value: "noindex, nofollow"
    - backendRefs:
        - group: ""
          kind: Service
          name: oj-adminer-service
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /db
      timeouts:
        request: "1h"
        backendRequest: "1h"
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: "X-Robots-Tag"
                value: "noindex, nofollow"
    - backendRefs:
        - group: ""
          kind: Service
          name: oj-filebrowser-service
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /file
      timeouts:
        request: "1h"
        backendRequest: "1h"
      filters:
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            add:
              - name: "X-Robots-Tag"
                value: "noindex, nofollow"
